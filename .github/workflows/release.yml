name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # Gate publishing on the same checks as CI plus artifact validation.
  # Third-party actions are pinned to immutable commit SHAs (the comment
  # records the tag they correspond to).
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Check tag matches the package version
        run: |
          PKG_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          TAG="${GITHUB_REF_NAME}"
          if [ "v${PKG_VERSION}" != "${TAG}" ]; then
            echo "::error::Tag ${TAG} does not match pyproject.toml version ${PKG_VERSION}"
            exit 1
          fi
          INIT_VERSION="$(python -c 'import re,pathlib; print(re.search(r"__version__ = \"([^\"]+)\"", pathlib.Path("src/tabayyan/__init__.py").read_text()).group(1))')"
          if [ "${PKG_VERSION}" != "${INIT_VERSION}" ]; then
            echo "::error::pyproject.toml version ${PKG_VERSION} does not match __init__.py version ${INIT_VERSION}"
            exit 1
          fi
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q

  build:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - name: Validate artifacts
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC trusted publishing — no API token needed
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
