name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # Gate publishing on the same checks as CI plus artifact validation.
  # Third-party actions are pinned to immutable commit SHAs (the comment
  # records the tag they correspond to).
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Check tag matches the package version
        run: |
          PKG_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          TAG="${GITHUB_REF_NAME}"
          if [ "v${PKG_VERSION}" != "${TAG}" ]; then
            echo "::error::Tag ${TAG} does not match pyproject.toml version ${PKG_VERSION}"
            exit 1
          fi
          INIT_VERSION="$(python -c 'import re,pathlib; print(re.search(r"__version__ = \"([^\"]+)\"", pathlib.Path("src/tabayyan/__init__.py").read_text()).group(1))')"
          if [ "${PKG_VERSION}" != "${INIT_VERSION}" ]; then
            echo "::error::pyproject.toml version ${PKG_VERSION} does not match __init__.py version ${INIT_VERSION}"
            exit 1
          fi
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q

  build:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - name: Validate artifacts
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC trusted publishing — no API token needed
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
